version: "3"

vars:
  BINARY_NAME: ops-mcp
  GO_PACKAGES: ./...
  GO_PARALLELISM: 1

env:
  GOTOOLCHAIN: go1.26.0

tasks:
  default:
    desc: Build the MCP server
    cmds:
      - task: build

  build:
    desc: Build the Go binary
    summary: Compile the Go MCP server into ./{{.BINARY_NAME}}.
    sources:
      - ./*.go
      - go.mod
      - go.sum
    generates:
      - "{{.BINARY_NAME}}"
    cmds:
      - go build -p {{.GO_PARALLELISM}} -trimpath -o {{.BINARY_NAME}} .

  test:
    desc: Run the Go test suite
    summary: Run all Go tests for the module.
    cmds:
      - go test -p {{.GO_PARALLELISM}} {{.GO_PACKAGES}}

  lint:
    desc: Run static checks for the Go codebase
    summary: Run Go static analysis over all packages.
    cmds:
      - go vet -p {{.GO_PARALLELISM}} {{.GO_PACKAGES}}

  clean:
    desc: Remove build artifacts and cached test data
    summary: Delete the local binary, coverage output, and Go build/test caches.
    cmds:
      - find . -maxdepth 1 -type f \( -name '{{.BINARY_NAME}}' -o -name 'coverage.out' \) -delete
      - go clean -testcache -cache
